<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FeliDream 🌙</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #6366f1; --night: #312e81; --bg: #f8fafc; --card: #ffffff; 
            --ink: #0f172a; --muted: #64748b; --border: #e2e8f0; --success: #10b981;
            --radius: 20px; --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--ink); line-height: 1.5; }
        .header { background: var(--night); padding: 20px; color: #fff; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .nav-tabs { display: flex; gap: 8px; background: #fff; padding: 8px; margin: 15px; border-radius: var(--radius); box-shadow: var(--shadow); }
        .nav-tab { flex: 1; padding: 12px; border: none; border-radius: 14px; background: transparent; font-weight: 700; color: var(--muted); cursor: pointer; font-size: 11px; text-transform: uppercase; }
        .nav-tab.active { background: var(--ink); color: #fff; }
        .container { padding: 0 15px 120px; max-width: 900px; margin: 0 auto; }
        .view { display: none; }
        .view.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Banner de Ventana */
        .window-banner { background: #fffbeb; border: 1.5px solid #fef3c7; padding: 15px; border-radius: 18px; margin-bottom: 20px; color: #92400e; font-size: 13px; }
        
        .card { background: var(--card); border-radius: var(--radius); padding: 20px; margin-bottom: 20px; box-shadow: var(--shadow); border: 1px solid var(--border); }
        .profile-picker { display: flex; gap: 10px; margin-bottom: 20px; }
        .profile-opt { flex: 1; padding: 12px; border: 2px solid var(--border); border-radius: 15px; text-align: center; cursor: pointer; transition: 0.3s; font-weight: 700; }
        .profile-opt.active { border-color: var(--primary); background: #eef2ff; color: var(--primary); }
        
        .status-hero { padding: 20px; border-radius: 20px; background: linear-gradient(135deg, #312e81, #6366f1); color: #fff; text-align: center; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { font-size: 11px; font-weight: 700; color: var(--muted); display: block; margin-bottom: 6px; }
        input, select { padding: 12px; border: 1.5px solid var(--border); border-radius: 12px; width: 100%; font-size: 15px; }
        .time-picker { display: flex; gap: 4px; }
        .btn { padding: 16px; border: none; border-radius: 14px; font-weight: 700; cursor: pointer; width: 100%; font-size: 14px; margin-top: 10px; }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-success { background: var(--success); color: #fff; }

        /* Estilos Bitácora */
        .log-row { border-bottom: 1px solid var(--border); padding: 12px 0; display: flex; justify-content: space-between; align-items: center; }
        .date-header { font-size: 11px; font-weight: 800; color: var(--primary); text-transform: uppercase; margin-top: 15px; }
        .btn-mini { padding: 6px 10px; border-radius: 8px; border: none; font-size: 10px; font-weight: 700; cursor: pointer; }

        /* Modal Edición */
        #edit-modal { display:none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center; padding: 20px; }
        .modal-content { background:#fff; border-radius:var(--radius); padding:25px; width:100%; max-width:400px; box-shadow: var(--shadow); }
    </style>
</head>
<body>

<div class="header">
    <div style="font-weight: 800;">FamilyDream 🕊️</div>
    <div id="reloj" style="font-size: 12px; font-family: monospace;"></div>
</div>

<nav class="nav-tabs">
    <button class="nav-tab active" onclick="switchTab('registro')">Registro de Sueño</button>
    <button class="nav-tab" onclick="switchTab('historial')">Historial de Sueño</button>
    <button class="nav-tab" onclick="switchTab('analitica')">Análisis de Sueño</button>
</nav>

<div class="container">
    <div id="view-registro" class="view active">
        <div id="ventana-display" class="window-banner" style="display:none;">
            💡 Próxima ventana de <b id="win-name"></b>: <b id="win-time">--:--</b>
        </div>

        <div class="profile-picker">
            <div class="profile-opt active" id="p-feli" onclick="setProfile('Feli', 330)">👦 Feli</div>
            <div class="profile-opt" id="p-bebe" onclick="setProfile('Bebé', 60)">👶 Bebé</div>
        </div>

        <div class="card">
            <div id="panel-inicio">
                <div class="form-group">
                    <label>Tipo</label>
                    <select id="reg_tipo"><option value="Siesta">Siesta 🌤️</option><option value="Nocturno">Noche 🌙</option></select>
                </div>
                <div class="form-group"><label>Fecha</label><input type="date" id="reg_f_ini"></div>
                <div class="form-group"><label>Hora de Inicio</label><div class="time-picker" id="tp_ini"></div></div>
                <button onclick="registrarInicio()" class="btn btn-primary" id="btn-label-ini">Iniciar Sueño</button>
            </div>

            <div id="panel-fin" style="display:none;">
                <div class="status-hero"><div id="msg-activo" style="font-size:18px; font-weight:700;"></div></div>
                <div class="form-group"><label>Fecha Despertar</label><input type="date" id="reg_f_fin"></div>
                <div class="form-group"><label>Hora Despertar</label><div class="time-picker" id="tp_fin"></div></div>
                <button onclick="registrarFin()" class="btn btn-success">¡Ya despertó!</button>
            </div>
        </div>
    </div>

    <div id="view-historial" class="view">
        <div class="card"><div id="listaHistorial"></div></div>
    </div>

    <div id="view-analitica" class="view">
        <div class="card"><div style="height:300px;"><canvas id="graficoSueno"></canvas></div></div>
    </div>
</div>

<div id="edit-modal">
    <div class="modal-content">
        <h3 style="margin-bottom:15px;">Editar Registro</h3>
        <input type="hidden" id="edit-id">
        <div class="form-group"><label>Tipo</label><select id="edit-tipo"><option value="Siesta">Siesta</option><option value="Nocturno">Noche</option></select></div>
        <div class="form-group"><label>Hora Inicio (24h)</label><input type="time" id="edit-h-ini"></div>
        <div class="form-group"><label>Hora Fin (24h)</label><input type="time" id="edit-h-fin"></div>
        <button onclick="guardarEdicion()" class="btn btn-primary">Guardar Cambios</button>
        <button onclick="document.getElementById('edit-modal').style.display='none'" class="btn" style="background:#eee;">Cancelar</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCq1uBRlyOeez3sbwZrpngvXVAEg8lb2hw",
        authDomain: "gomez-finance-94b2c.firebaseapp.com",
        projectId: "gomez-finance-94b2c",
        storageBucket: "gomez-finance-94b2c.firebasestorage.app",
        messagingSenderId: "23675517740",
        appId: "1:23675517740:web:6d2b44cd72b04fba29ca89"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const colRef = collection(db, "sueno_familiar");
    
    let sesiones = [];
    let activa = null;
    let currentChild = "Feli";
    let currentWindow = 330;
    let chartInstance = null;

    const crearTP = (id) => {
        const h = Array.from({length: 12}, (_, i) => `<option value="${i+1}">${i+1}</option>`).join('');
        const m = Array.from({length: 60}, (_, i) => `<option value="${i.toString().padStart(2,'0')}">${i.toString().padStart(2,'0')}</option>`).join('');
        document.getElementById(id).innerHTML = `<select id="${id}_h">${h}</select>:<select id="${id}_m">${m}</select><select id="${id}_p"><option>AM</option><option>PM</option></select>`;
    };

    const getH24 = (id) => {
        let h = parseInt(document.getElementById(`${id}_h`).value);
        let m = document.getElementById(`${id}_m`).value;
        let p = document.getElementById(`${id}_p`).value;
        if(p === 'PM' && h < 12) h += 12; else if(p === 'AM' && h === 12) h = 0;
        return `${h.toString().padStart(2,'0')}:${m}`;
    };

    window.setProfile = (name, mins) => {
        currentChild = name; currentWindow = mins;
        document.querySelectorAll('.profile-opt').forEach(el => el.classList.remove('active'));
        document.getElementById(name === 'Feli' ? 'p-feli' : 'p-bebe').classList.add('active');
        actualizarUI();
    };

    onSnapshot(query(colRef, orderBy("timestamp", "desc")), (snap) => {
        sesiones = []; activa = null;
        snap.forEach(d => {
            const data = { id: d.id, ...d.data() };
            sesiones.push(data);
            if(data.estado === 'abierto') activa = data;
        });
        actualizarUI();
    });

    function actualizarUI() {
        const pIni = document.getElementById('panel-inicio');
        const pFin = document.getElementById('panel-fin');
        const vDisp = document.getElementById('ventana-display');
        
        document.getElementById('btn-label-ini').innerText = `${currentChild} empezó a dormir`;

        if(activa) {
            pIni.style.display = "none"; pFin.style.display = "block"; vDisp.style.display = "none";
            document.getElementById('msg-activo').innerText = `${activa.nombre} está durmiendo`;
            document.getElementById('reg_f_fin').value = new Date().toISOString().split('T')[0];
        } else {
            pIni.style.display = "block"; pFin.style.display = "none";
            document.getElementById('reg_f_ini').value = new Date().toISOString().split('T')[0];
            
            const ultimo = sesiones.find(s => s.nombre === currentChild && s.estado === 'cerrado');
            if(ultimo) {
                vDisp.style.display = "block";
                document.getElementById('win-name').innerText = currentChild;
                let [h, m] = ultimo.h_fin.split(':');
                let d = new Date(); d.setHours(h); d.setMinutes(m);
                d.setMinutes(d.getMinutes() + currentWindow);
                document.getElementById('win-time').innerText = d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            }
        }
        renderHistorial();
    }

    window.registrarInicio = async () => {
        await addDoc(colRef, { 
            nombre: currentChild, tipo: document.getElementById('reg_tipo').value, 
            f_inicio: document.getElementById('reg_f_ini').value, h_inicio: getH24('tp_ini'), 
            estado: 'abierto', timestamp: new Date() 
        });
    };

    window.registrarFin = async () => {
        const f2 = document.getElementById('reg_f_fin').value;
        const h2 = getH24('tp_fin');
        const d1 = new Date(`${activa.f_inicio}T${activa.h_inicio}`);
        const d2 = new Date(`${f2}T${h2}`);
        const diff = (d2 - d1) / 3600000;
        await updateDoc(doc(db, "sueno_familiar", activa.id), { f_fin: f2, h_fin: h2, duracion: diff, estado: 'cerrado' });
    };

    function renderHistorial() {
        const div = document.getElementById('listaHistorial'); div.innerHTML = "";
        let ultimaFecha = "";
        sesiones.filter(s => s.estado === 'cerrado').forEach(s => {
            const fechaD = new Date(s.f_inicio + "T00:00:00").toLocaleDateString('es-CR', { weekday: 'long', day: 'numeric', month: 'long' });
            if(fechaD !== ultimaFecha) { div.innerHTML += `<div class="date-header">${fechaD}</div>`; ultimaFecha = fechaD; }
            div.innerHTML += `<div class="log-row">
                <div><b>${s.nombre}</b>: ${s.duracion.toFixed(1)}h <br><small>${s.h_inicio} - ${s.h_fin} (${s.tipo})</small></div>
                <div style="display:flex; gap:5px;">
                    <button class="btn-mini" style="background:#eef2ff; color:#6366f1;" onclick="abrirEditor('${s.id}')">Editar</button>
                    <button class="btn-mini" style="background:#fee2e2; color:red;" onclick="eliminar('${s.id}')">🗑️</button>
                </div>
            </div>`;
        });
    }

    window.abrirEditor = (id) => {
        const s = sesiones.find(x => x.id === id);
        document.getElementById('edit-id').value = id;
        document.getElementById('edit-tipo').value = s.tipo;
        document.getElementById('edit-h-ini').value = s.h_inicio;
        document.getElementById('edit-h-fin').value = s.h_fin;
        document.getElementById('edit-modal').style.display = 'flex';
    };

    window.guardarEdicion = async () => {
        const id = document.getElementById('edit-id').value;
        const reg = sesiones.find(x => x.id === id);
        const h1 = document.getElementById('edit-h-ini').value;
        const h2 = document.getElementById('edit-h-fin').value;
        const d1 = new Date(`${reg.f_inicio}T${h1}`);
        const d2 = new Date(`${reg.f_fin || reg.f_inicio}T${h2}`);
        const diff = (d2 - d1) / 3600000;
        await updateDoc(doc(db, "sueno_familiar", id), { 
            tipo: document.getElementById('edit-tipo').value, 
            h_inicio: h1, h_fin: h2, duracion: diff 
        });
        document.getElementById('edit-modal').style.display = 'none';
    };

    window.eliminar = async (id) => { if(confirm("¿Eliminar?")) await deleteDoc(doc(db, "sueno_familiar", id)); };

    window.renderChart = () => {
        const ctx = document.getElementById('graficoSueno').getContext('2d');
        const labels = [...Array(7)].map((_, i) => {
            const d = new Date(); d.setDate(d.getDate() - (6-i));
            return d.toISOString().split('T')[0];
        });
        const dFeli = labels.map(l => sesiones.filter(s => s.nombre === 'Feli' && s.f_inicio === l).reduce((a, b) => a + b.duracion, 0));
        const dBebe = labels.map(l => sesiones.filter(s => s.nombre === 'Bebé' && s.f_inicio === l).reduce((a, b) => a + b.duracion, 0));
        if(chartInstance) chartInstance.destroy();
        chartInstance = new Chart(ctx, {
            type: 'bar',
            data: { labels: labels.map(l => l.split('-')[2]), datasets: [
                { label: 'Feli', data: dFeli, backgroundColor: '#6366f1' },
                { label: 'Bebé', data: dBebe, backgroundColor: '#10b981' }
            ]},
            options: { maintainAspectRatio: false }
        });
    };

    window.switchTab = (t) => {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-tab').forEach(n => n.classList.remove('active'));
        document.getElementById('view-'+t).classList.add('active');
        event.currentTarget.classList.add('active');
        if(t === 'analitica') renderChart();
    };

    crearTP('tp_ini'); crearTP('tp_fin');
    setInterval(() => { document.getElementById('reloj').innerText = new Date().toLocaleTimeString(); }, 1000);
</script>
</body>
</html>
